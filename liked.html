<!DOCTYPE html>
<html>
<head>
    <title>Liked Blogs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
    <div class="logo">✍️ InkFlow</div>

    <div class="nav-links">
        <a href="home.html">Home</a>
    </div>
</nav>

<h1>❤️ Your Liked Blogs</h1>

<div id="likedBlogsContainer" class="blog-grid"></div>


<script>
function loadLikedBlogs() {
    const currentUser = localStorage.getItem("user");

    if (!currentUser) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    const likedBlogs =
        JSON.parse(
            localStorage.getItem(
                `likedBlogs_${currentUser}`
            )
        ) || [];

    const container =
        document.getElementById("likedBlogsContainer");

    container.innerHTML = "";

    likedBlogs.forEach(blog => {
        container.innerHTML += `
            <div class="blog-card">
                <img src="${blog.image}">
                <div class="blog-card-content">
                    <h3>${blog.title}</h3>
                    <p>${blog.content}</p>
                </div>
            </div>
        `;
    });
}

window.onload = loadLikedBlogs;
</script>

</body>
</html>
