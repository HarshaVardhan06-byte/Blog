<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Colorful Blog</title>
    <!-- We use Tailwind CSS for rapid, beautiful, colorful styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for attractive typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* A beautiful, vibrant gradient background */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }
        /* Custom Glassmorphism effect for our UI */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .gradient-text {
            background: linear-gradient(to right, #ec4899, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-6xl font-bold mb-4 gradient-text">Create & Inspire</h1>
            <p class="text-gray-600 text-lg">A modern space to share your thoughts with the world.</p>
        </header>

        <!-- Input Form Section -->
        <section class="mb-16">
            <div class="glass-card rounded-3xl p-8 transform transition hover:shadow-2xl">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6">Write a new post</h2>
                <form id="blog-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Blog Title</label>
                        <input type="text" id="title" required 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-400 bg-white/50 transition"
                            placeholder="My amazing journey...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Content</label>
                        <textarea id="content" required rows="4"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 bg-white/50 transition"
                            placeholder="What's on your mind?"></textarea>
                    </div>
                    <button type="submit" 
                        class="w-full md:w-auto px-8 py-3 bg-gradient-to-r from-pink-500 to-purple-600 text-white font-semibold rounded-xl shadow-lg hover:shadow-pink-500/30 transform hover:-translate-y-1 transition duration-300">
                        Publish Post 🚀
                    </button>
                    <!-- Success Message (hidden by default) -->
                    <p id="status-message" class="text-sm font-semibold hidden"></p>
                </form>
            </div>
        </section>

        <!-- Blog Display Section -->
        <section>
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-3xl font-bold text-gray-800">Recent Stories</h2>
                <button onclick="fetchBlogs()" class="text-purple-600 hover:text-pink-500 font-semibold transition">
                    Refresh ↻
                </button>
            </div>
            
            <!-- This is where JavaScript will inject our colorful blog cards -->
            <div id="blog-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Loading State -->
                <div class="col-span-full text-center text-gray-500 py-10">
                    Loading awesome stories... If it takes too long, make sure your FastAPI backend is running!
                </div>
            </div>
        </section>
    </div>

    <!-- JavaScript Logic to Connect to Backend -->
    <script>
        // ==========================================
        // STEP 5: CONNECT FRONTEND & BACKEND
        // ==========================================
        
        // ⚠️ CRITICAL: Change this URL when you deploy your backend to Render!
        // Example: const API_URL = "https://my-render-api.onrender.com";
        const API_URL = "http://127.0.0.1:8000";

        const blogForm = document.getElementById('blog-form');
        const blogContainer = document.getElementById('blog-container');
        const statusMessage = document.getElementById('status-message');

        // Function to Fetch and Display Blogs
        async function fetchBlogs() {
            try {
                const response = await fetch(`${API_URL}/blogs`);
                const blogs = await response.json();
                
                // Clear the container
                blogContainer.innerHTML = '';

                if (blogs.length === 0) {
                    blogContainer.innerHTML = '<p class="text-gray-500 italic col-span-full text-center py-8">No posts yet. Be the first to write one!</p>';
                    return;
                }

                // Loop through blogs and create attractive cards
                blogs.forEach(blog => {
                    const card = `
                        <div class="glass-card p-6 rounded-2xl transform transition duration-300 hover:-translate-y-2 hover:shadow-xl group">
                            <span class="inline-block px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-xs font-bold mb-4 tracking-wider uppercase">Blog Post</span>
                            <h3 class="text-2xl font-bold text-gray-800 mb-3 group-hover:text-pink-500 transition">${blog.title}</h3>
                            <p class="text-gray-600 leading-relaxed">${blog.content}</p>
                        </div>
                    `;
                    blogContainer.innerHTML += card;
                });
            } catch (error) {
                console.error("Error fetching blogs:", error);
                blogContainer.innerHTML = `
                    <div class="col-span-full bg-red-50 text-red-500 p-4 rounded-xl text-center">
                        Unable to connect to the backend. Make sure your FastAPI server is running on ${API_URL}!
                    </div>
                `;
            }
        }

        // Function to Create a New Blog
        blogForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page reload
            
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            // Show loading state
            statusMessage.textContent = "Publishing...";
            statusMessage.className = "text-sm font-semibold text-blue-500 block mt-4";

            try {
                const response = await fetch(`${API_URL}/blogs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title: title, content: content })
                });

                if (response.ok) {
                    // Success!
                    statusMessage.textContent = "✨ Post published successfully!";
                    statusMessage.className = "text-sm font-semibold text-green-500 block mt-4";
                    
                    // Clear the form
                    blogForm.reset();
                    
                    // Hide success message after 3 seconds
                    setTimeout(() => statusMessage.classList.add('hidden'), 3000);

                    // Refresh the blogs list
                    fetchBlogs();
                } else {
                    throw new Error("Failed to post");
                }
            } catch (error) {
                console.error("Error posting blog:", error);
                statusMessage.textContent = "❌ Failed to publish. Check if server is running.";
                statusMessage.className = "text-sm font-semibold text-red-500 block mt-4";
            }
        });

        // Fetch blogs immediately when the page loads
        fetchBlogs();
    </script>
</body>
</html>
